name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands or steps to trigger the bug.
      placeholder: |
        1. Run `stackydo create --title "test"`
        2. Run `stackydo list`
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: stackydo version
      description: Output of `stackydo --version`
      placeholder: "stackydo 0.9.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (aarch64)
        - Windows
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - Homebrew
        - Shell installer (curl)
        - PowerShell installer
        - Other
    validations:
      required: true
